<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="octaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="20"/>

  <!-- Grid lines -->
  <g stroke="#1f2937" stroke-width="1" opacity="0.4">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
  </g>

  <!-- Octopus icon — 8 arms radiating from center -->
  <g transform="translate(120, 200)" filter="url(#strongGlow)">
    <!-- Center circle -->
    <circle cx="0" cy="0" r="35" fill="url(#octaGrad)" opacity="0.9"/>
    <circle cx="0" cy="0" r="28" fill="#0d1117" opacity="0.8"/>
    <text x="0" y="8" font-family="Arial" font-size="22" font-weight="bold"
          fill="#00d4ff" text-anchor="middle" filter="url(#glow)">🐙</text>

    <!-- 8 Arms -->
    <g stroke="url(#octaGrad)" stroke-width="3" fill="none" opacity="0.8">
      <!-- Top -->
      <path d="M0,-35 Q0,-65 10,-80" stroke-linecap="round"/>
      <!-- Top-Right -->
      <path d="M25,-25 Q55,-45 70,-55" stroke-linecap="round"/>
      <!-- Right -->
      <path d="M35,0 Q65,0 80,10" stroke-linecap="round"/>
      <!-- Bottom-Right -->
      <path d="M25,25 Q55,45 70,55" stroke-linecap="round"/>
      <!-- Bottom -->
      <path d="M0,35 Q0,65 -10,80" stroke-linecap="round"/>
      <!-- Bottom-Left -->
      <path d="M-25,25 Q-55,45 -70,55" stroke-linecap="round"/>
      <!-- Left -->
      <path d="M-35,0 Q-65,0 -80,-10" stroke-linecap="round"/>
      <!-- Top-Left -->
      <path d="M-25,-25 Q-55,-45 -70,-55" stroke-linecap="round"/>
    </g>

    <!-- Arm endpoint dots -->
    <g fill="#00ff88" filter="url(#glow)">
      <circle cx="10" cy="-80" r="4"/>
      <circle cx="70" cy="-55" r="4"/>
      <circle cx="80" cy="10" r="4"/>
      <circle cx="70" cy="55" r="4"/>
      <circle cx="-10" cy="80" r="4"/>
      <circle cx="-70" cy="55" r="4"/>
      <circle cx="-80" cy="-10" r="4"/>
      <circle cx="-70" cy="-55" r="4"/>
    </g>
  </g>

  <!-- Main OCTA text -->
  <text x="240" y="165" font-family="Arial Black, Arial" font-size="90"
        font-weight="900" fill="url(#textGrad)"
        filter="url(#strongGlow)" letter-spacing="8">OCTA</text>

  <!-- AI text -->
  <text x="252" y="240" font-family="Arial Black, Arial" font-size="72"
        font-weight="900" fill="#ffffff"
        filter="url(#glow)" letter-spacing="6" opacity="0.95">AI</text>

  <!-- Version badge -->
  <rect x="340" y="215" width="80" height="28" rx="14"
        fill="#7c3aed" opacity="0.9"/>
  <text x="380" y="234" font-family="Arial" font-size="14"
        font-weight="bold" fill="white" text-anchor="middle">v1.0</text>

  <!-- Tagline -->
  <text x="240" y="278" font-family="Arial" font-size="16"
        fill="#8b949e" letter-spacing="2">OMNIPOTENT CYBER THREAT ANALYSIS AI</text>

  <!-- Separator line -->
  <line x1="240" y1="295" x2="760" y2="295"
        stroke="url(#textGrad)" stroke-width="1" opacity="0.5"/>

  <!-- Feature badges -->
  <g font-family="Arial" font-size="12" fill="#c9d1d9">
    <!-- Badge 1 -->
    <rect x="240" y="310" width="110" height="24" rx="12" fill="#161b22" stroke="#00d4ff" stroke-width="1"/>
    <text x="295" y="326" text-anchor="middle" fill="#00d4ff">🧠 4-Phase AI</text>

    <!-- Badge 2 -->
    <rect x="360" y="310" width="110" height="24" rx="12" fill="#161b22" stroke="#7c3aed" stroke-width="1"/>
    <text x="415" y="326" text-anchor="middle" fill="#7c3aed">🔐 Security</text>

    <!-- Badge 3 -->
    <rect x="480" y="310" width="110" height="24" rx="12" fill="#161b22" stroke="#00ff88" stroke-width="1"/>
    <text x="535" y="326" text-anchor="middle" fill="#00ff88">🔍 OSINT</text>

    <!-- Badge 4 -->
    <rect x="600" y="310" width="120" height="24" rx="12" fill="#161b22" stroke="#f59e0b" stroke-width="1"/>
    <text x="660" y="326" text-anchor="middle" fill="#f59e0b">♾️ Free APIs</text>
  </g>

  <!-- Stats bar -->
  <g font-family="Arial" font-size="11" fill="#6b7280">
    <text x="240" y="365">82,500+ req/day</text>
    <text x="380" y="365">•</text>
    <text x="395" y="365">$0/month</text>
    <text x="465" y="365">•</text>
    <text x="480" y="365">Parrot OS / Kali Linux</text>
    <text x="635" y="365">•</text>
    <text x="650" y="365">github.com/lawcy0fficial</text>
  </g>

  <!-- Border glow -->
  <rect width="800" height="400" fill="none"
        stroke="url(#textGrad)" stroke-width="2"
        rx="20" opacity="0.4"/>
</svg>
