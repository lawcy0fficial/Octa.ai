<svg width="70" height="70" viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sglow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#sglow)">
    <circle cx="35" cy="35" r="6" fill="#00d4ff">
      <animate attributeName="cx" values="12;12;58;58;12" keyTimes="0;0.25;0.5;0.75;1" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#00d4ff;#7c3aed;#00ff88;#00d4ff" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="35" cy="35" r="4" fill="#7c3aed" opacity="0.85">
      <animateTransform attributeName="transform" type="rotate" from="0 35 35" to="360 35 35" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="35;16;35;54;35" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="35" cy="35" r="26" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.55" stroke-dasharray="8 6">
      <animateTransform attributeName="transform" type="rotate" from="0 35 35" to="360 35 35" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
