<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#1a1a3e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2b0d3e;stop-opacity:1"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="textGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff">
        <animate attributeName="stop-color" values="#00d4ff;#7c3aed;#00ff88;#00d4ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#7c3aed">
        <animate attributeName="stop-color" values="#7c3aed;#00ff88;#00d4ff;#7c3aed" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#00ff88">
        <animate attributeName="stop-color" values="#00ff88;#00d4ff;#7c3aed;#00ff88" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow2"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="strongGlow2"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="900" height="360" fill="url(#bgGrad2)" rx="22"/>

  <!-- twinkling grid dots -->
  <g fill="#2a3550">
    <circle cx="60" cy="40" r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="140" cy="90" r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="60" r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="310" r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.4s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="40" cy="300" r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" begin="0.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Octopus core, 8 pulsing arms -->
  <g transform="translate(130, 180)">
    <circle cx="0" cy="0" r="46" fill="url(#coreGlow)">
      <animate attributeName="r" values="40;52;40" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="34" fill="#0d1117" stroke="url(#textGrad2)" stroke-width="2" filter="url(#strongGlow2)"/>
    <text x="0" y="9" font-family="Arial" font-size="26" text-anchor="middle">🐙</text>

    <g stroke="url(#textGrad2)" stroke-width="3" fill="none" filter="url(#glow2)">
      <path d="M0,-34 Q0,-64 10,-80"/>
      <path d="M24,-24 Q54,-44 68,-54"/>
      <path d="M34,0 Q64,0 78,10"/>
      <path d="M24,24 Q54,44 68,54"/>
      <path d="M0,34 Q0,64 -10,80"/>
      <path d="M-24,24 Q-54,44 -68,54"/>
      <path d="M-34,0 Q-64,0 -78,-10"/>
      <path d="M-24,-24 Q-54,-44 -68,-54"/>
    </g>

    <!-- traveling signal pulses along each arm -->
    <g fill="#00ff88" filter="url(#glow2)">
      <circle r="3.2"><animateMotion dur="1.6s" repeatCount="indefinite" path="M0,-34 Q0,-64 10,-80"/></circle>
      <circle r="3.2"><animateMotion dur="1.6s" begin="0.2s" repeatCount="indefinite" path="M24,-24 Q54,-44 68,-54"/></circle>
      <circle r="3.2"><animateMotion dur="1.6s" begin="0.4s" repeatCount="indefinite" path="M34,0 Q64,0 78,10"/></circle>
      <circle r="3.2"><animateMotion dur="1.6s" begin="0.6s" repeatCount="indefinite" path="M24,24 Q54,44 68,54"/></circle>
      <circle r="3.2"><animateMotion dur="1.6s" begin="0.8s" repeatCount="indefinite" path="M0,34 Q0,64 -10,80"/></circle>
      <circle r="3.2"><animateMotion dur="1.6s" begin="1.0s" repeatCount="indefinite" path="M-24,24 Q-54,44 -68,54"/></circle>
      <circle r="3.2"><animateMotion dur="1.6s" begin="1.2s" repeatCount="indefinite" path="M-34,0 Q-64,0 -78,-10"/></circle>
      <circle r="3.2"><animateMotion dur="1.6s" begin="1.4s" repeatCount="indefinite" path="M-24,-24 Q-54,-44 -68,-54"/></circle>
    </g>
  </g>

  <!-- OCTA AI wordmark -->
  <text x="260" y="150" font-family="Arial Black, Arial" font-size="82" font-weight="900" fill="url(#textGrad2)" filter="url(#strongGlow2)" letter-spacing="6">OCTA AI</text>

  <text x="264" y="192" font-family="Arial" font-size="17" fill="#8b949e" letter-spacing="2.5">OMNIPOTENT CYBER THREAT ANALYSIS AI — AGENTIC · $0/MONTH</text>

  <line x1="264" y1="208" x2="840" y2="208" stroke="url(#textGrad2)" stroke-width="1" opacity="0.5"/>

  <!-- animated marching-ants status line -->
  <line x1="264" y1="222" x2="840" y2="222" stroke="#00ff88" stroke-width="2" stroke-dasharray="6 10" opacity="0.8">
    <animate attributeName="stroke-dashoffset" values="0;-32" dur="1.4s" repeatCount="indefinite"/>
  </line>

  <!-- feature badges -->
  <g font-family="Arial" font-size="13" fill="#c9d1d9">
    <rect x="264" y="240" width="118" height="26" rx="13" fill="#161b22" stroke="#00d4ff" stroke-width="1"/>
    <text x="323" y="257" text-anchor="middle" fill="#00d4ff">🧠 4-Phase Agent</text>

    <rect x="392" y="240" width="108" height="26" rx="13" fill="#161b22" stroke="#7c3aed" stroke-width="1"/>
    <text x="446" y="257" text-anchor="middle" fill="#7c3aed">🔐 Security</text>

    <rect x="510" y="240" width="98" height="26" rx="13" fill="#161b22" stroke="#00ff88" stroke-width="1"/>
    <text x="559" y="257" text-anchor="middle" fill="#00ff88">🔍 OSINT</text>

    <rect x="618" y="240" width="120" height="26" rx="13" fill="#161b22" stroke="#f59e0b" stroke-width="1"/>
    <text x="678" y="257" text-anchor="middle" fill="#f59e0b">♾️ Free APIs</text>

    <rect x="748" y="240" width="92" height="26" rx="13" fill="#161b22" stroke="#ff2e88" stroke-width="1"/>
    <text x="794" y="257" text-anchor="middle" fill="#ff2e88">🐧 Parrot OS</text>
  </g>

  <g font-family="Arial" font-size="12" fill="#6b7280">
    <text x="264" y="300">82,500+ req/day</text>
    <text x="404" y="300">•</text>
    <text x="418" y="300">$0/month forever</text>
    <text x="560" y="300">•</text>
    <text x="574" y="300">35+ MCP tools</text>
    <text x="690" y="300">•</text>
    <text x="704" y="300">github.com/lawcy0fficial</text>
  </g>

  <rect width="900" height="360" fill="none" stroke="url(#textGrad2)" stroke-width="2" rx="22" opacity="0.5"/>
</svg>
