<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161033"/>
    </linearGradient>
    <filter id="pglow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="260" rx="18" fill="url(#pbg)"/>

  <!-- connecting rail -->
  <line x1="90" y1="130" x2="810" y2="130" stroke="#30363d" stroke-width="3"/>
  <line x1="90" y1="130" x2="810" y2="130" stroke="#00d4ff" stroke-width="3" stroke-dasharray="10 14" opacity="0.9">
    <animate attributeName="stroke-dashoffset" values="0;-48" dur="1.6s" repeatCount="indefinite"/>
  </line>

  <!-- traveling packets -->
  <g filter="url(#pglow)">
    <circle r="5" fill="#00d4ff"><animateMotion dur="3.2s" repeatCount="indefinite" path="M90,130 L810,130"/></circle>
    <circle r="5" fill="#7c3aed"><animateMotion dur="3.2s" begin="0.8s" repeatCount="indefinite" path="M90,130 L810,130"/></circle>
    <circle r="5" fill="#00ff88"><animateMotion dur="3.2s" begin="1.6s" repeatCount="indefinite" path="M90,130 L810,130"/></circle>
    <circle r="5" fill="#ff2e88"><animateMotion dur="3.2s" begin="2.4s" repeatCount="indefinite" path="M90,130 L810,130"/></circle>
  </g>

  <!-- 4 nodes -->
  <g font-family="Arial" text-anchor="middle">
    <!-- Discussion -->
    <g transform="translate(90,130)">
      <circle r="34" fill="#161b22" stroke="#00d4ff" stroke-width="2.5" filter="url(#pglow)">
        <animate attributeName="r" values="32;36;32" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text y="7" font-size="22">🧠</text>
      <text y="58" font-size="14" fill="#00d4ff" font-weight="bold">DISCUSSION</text>
      <text y="76" font-size="11" fill="#6b7280">Multi-provider reasoning</text>
    </g>
    <!-- Planning -->
    <g transform="translate(330,130)">
      <circle r="34" fill="#161b22" stroke="#7c3aed" stroke-width="2.5" filter="url(#pglow)">
        <animate attributeName="r" values="32;36;32" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
      <text y="7" font-size="22">📋</text>
      <text y="58" font-size="14" fill="#7c3aed" font-weight="bold">PLANNING</text>
      <text y="76" font-size="11" fill="#6b7280">Blueprint before code</text>
    </g>
    <!-- Execution -->
    <g transform="translate(570,130)">
      <circle r="34" fill="#161b22" stroke="#ff2e88" stroke-width="2.5" filter="url(#pglow)">
        <animate attributeName="r" values="32;36;32" dur="2s" begin="1s" repeatCount="indefinite"/>
      </circle>
      <text y="7" font-size="22">⚙️</text>
      <text y="58" font-size="14" fill="#ff2e88" font-weight="bold">EXECUTION</text>
      <text y="76" font-size="11" fill="#6b7280">Local Ollama, unlimited</text>
    </g>
    <!-- Review -->
    <g transform="translate(810,130)">
      <circle r="34" fill="#161b22" stroke="#00ff88" stroke-width="2.5" filter="url(#pglow)">
        <animate attributeName="r" values="32;36;32" dur="2s" begin="1.5s" repeatCount="indefinite"/>
      </circle>
      <text y="7" font-size="22">✅</text>
      <text y="58" font-size="14" fill="#00ff88" font-weight="bold">REVIEW</text>
      <text y="76" font-size="11" fill="#6b7280">Quality polish pass</text>
    </g>
  </g>

  <text x="450" y="30" font-family="Arial" font-size="15" fill="#8b949e" text-anchor="middle" letter-spacing="1.5">THE OCTA AI AGENT LOOP — RUNS AUTOMATICALLY, END TO END</text>
</svg>
